<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luna - Headlamp AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
    header { background: #16213e; padding: 1rem; display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid #0f3460; }
    header h1 { color: #e94560; font-size: 1.5rem; }
    header span { font-size: 1.5rem; }
    .status { margin-left: auto; display: flex; gap: 0.5rem; align-items: center; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #4ecca3; }
    main { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .msg { max-width: 80%; padding: 0.75rem 1rem; border-radius: 12px; line-height: 1.5; }
    .msg.bot { background: #16213e; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.user { background: #e94560; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg code { background: #0f3460; padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
    footer { background: #16213e; padding: 1rem; display: flex; gap: 0.5rem; border-top: 1px solid #0f3460; }
    footer input { flex: 1; padding: 0.75rem; border-radius: 8px; border: 1px solid #0f3460; background: #1a1a2e; color: #fff; font-size: 1rem; }
    footer input:focus { outline: none; border-color: #e94560; }
    footer button { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; background: #e94560; color: #fff; cursor: pointer; }
    footer button:hover { background: #c73e54; }
  </style>
</head>
<body>
  <header>
    <span>🌙</span>
    <h1>Luna</h1>
    <div class="status"><span>Luna AI</span><div class="dot"></div></div>
  </header>
  <main id="chat">
    <div class="msg bot">Hey there! I'm Luna, your Headlamp AI sidekick. Whether you're wiring up an LLM provider, deploying to your cluster, or debugging — I've got you. What can I help with?</div>
  </main>
  <footer>
    <input type="text" placeholder="Ask Luna..." id="input" autofocus>
    <button onclick="send()">Send</button>
  </footer>
  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    function send() {
      const txt = input.value.trim();
      if (!txt) return;
      chat.innerHTML += `<div class="msg user">${txt}</div>`;
      input.value = '';
      chat.scrollTop = chat.scrollHeight;
      // TODO: Connect to Luna agent API
      setTimeout(() => {
        chat.innerHTML += `<div class="msg bot">I'm here to help! Connect me to a Kubernetes cluster to get started with pod management, GitOps, and more. 🚀</div>`;
        chat.scrollTop = chat.scrollHeight;
      }, 500);
    }
    input.addEventListener('keypress', e => e.key === 'Enter' && send());
  </script>
</body>
</html>

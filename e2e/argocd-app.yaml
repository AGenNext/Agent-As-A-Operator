apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp-ai
  namespace: argocd
  labels:
    app.kubernetes.io/name: headlamp-ai
    app.kubernetes.io/component: ai-assistant
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/headlamp-k8s/plugins.git
    targetRevision: main
    path: ai-assistant/pod-manager/stackbuilder
  
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagation=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
  
  revisionHistoryLimit: 10
# Flux CD E2E Test Manifest
# Tests Flux GitOps sync for Luna agent

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: luna-agent-e2e-test
  namespace: flux-system
  annotations:
    test.luna/e2e: "true"
spec:
  interval: 1m
  path: ./e2e
  prune: false
  sourceRef:
    kind: GitRepository
    name: luna-agent-source
  postBuild:
    substitute:
      TEST_ENV: "e2e"
      TEST_REPO: "AGenNext/Operator-Agents"

---
# Test verification resource

apiVersion: v1
kind: ConfigMap
metadata:
  name: luna-agent-e2e-config
  namespace: headlamp
  labels:
    app.kubernetes.io/name: luna-agent
    test.luna/verification: "true"
data:
  test: "flux-cd-sync"
  expected-components: |
    - GitRepository: luna-agent-source
    - Kustomization: luna-agent-deploy
    - Kustomization: luna-agent-sync
    - HelmRelease: pod-manager
# Flux HelmRepository for Luna agent dependencies

apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: luna-agent-charts
  namespace: flux-system
spec:
  interval: 5m
  url: https://agenext.github.io/charts
  secretRef:
    name: flux-agent-token

---
# HelmRelease for pod-manager

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pod-manager
  namespace: headlamp
spec:
  interval: 10m
  chart:
    spec:
      chart: pod-manager
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: luna-agent-charts
  values:
    replicaCount: 2
    image:
      repository: ghcr.io/headlamp-k8s/plugins/pod-manager
      tag: latest
    env:
      AI_PROVIDER: openai
      NAMESPACE: headlamp

---
# Kubernetes deployment manifest synced by Flux

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: luna-agent-manifests
  namespace: flux-system
spec:
  interval: 15m
  sourceRef:
    kind: GitRepository
    name: luna-agent-source
  path: ./deploy/k8s
  targetNamespace: headlamp
  prune: true
  createNamespace: true
  patches:
    - patch: |-
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: pod-manager
        spec:
          replicas: 2
      target:
        kind: Deployment
        name: pod-manager
# Flux NotificationController for multi-repo sync events

apiVersion: notification.toolkit.fluxcd.io/v1
kind: Provider
metadata:
  name: github-webhook
  namespace: flux-system
spec:
  type: github
  address: https://github.com/AGenNext/Operator-Agents
  secretRef:
    name: webhook-token

---
# Alert for source changes

apiVersion: notification.toolkit.fluxcd.io/v1
kind: Alert
metadata:
  name: luna-agent-alert
  namespace: flux-system
spec:
  providerRef:
    name: github-webhook
  eventSources:
    - kind: GitRepository
      name: luna-agent-source
    - kind: Kustomization
      name: luna-agent-deploy
    - kind: Kustomization
      name: luna-agent-sync

---
# Repository sync configuration
# Flux will help trigger the sync workflow when source changes

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: luna-agent-repos
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: luna-agent-source
  path: ./repos
  prune: false
  # Disable wait to prevent blocking on external operations
  wait: false
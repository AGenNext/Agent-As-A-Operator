name: Sync Luna Agent to Multiple Repos via Flux

on:
  push:
    branches:
      - main
    paths:
      - 'agents/**'
      - 'skills/**'
      - 'AGENT_CARD.md'
      - 'CARD.md'
      - 'flux/**'
  workflow_dispatch:

env:
  SOURCE_REPO: AGenNext/Operator-Agents

jobs:
  # ============================================
  # Job 1: Update headlamp-k8s/plugins
  # ============================================
  sync-headlamp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          path: source
      
      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: Sync to headlamp-k8s/plugins
        run: |
          cd source
          
          # Create a branch for the update
          git checkout -b luna-agent-sync-$(date +%Y%m%d%H%M%S)
          
          # Copy agent files
          mkdir -p ../temp-sync/ai-assistant/agents
          mkdir -p ../temp-sync/ai-assistant/.skills
          
          cp -r agents/* ../temp-sync/ai-assistant/agents/
          cp -r skills/* ../temp-sync/ai-assistant/.skills/
          cp AGENT_CARD.md ../temp-sync/ai-assistant/
          cp CARD.md ../temp-sync/ai-assistant/
          
          # Clone target repo
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/headlamp-k8s/plugins.git ../target
          
          # Copy files to target
          cp -r ../temp-sync/* ../target/
          
          # Commit and push
          cd ../target
          git add .
          git commit -m "chore(sync): sync Luna agent from AGenNext/Operator-Agents"
          git push -u origin HEAD:feature/luna-agent-sync
          
          # Create PR
          gh pr create \
            --title "chore(sync): sync Luna agent from AGenNext/Operator-Agents" \
            --body "Auto-synced Luna agent configuration from AGenNext/Operator-Agents\n\n- Agent definition (Luna)\n- Skills (gitops, semantic-validation)\n- Agent cards" \
            --base main \
            --repo headlamp-k8s/plugins || echo "PR may already exist"

  # ============================================
  # Job 2: Update Agent-Services
  # ============================================
  sync-agent-services:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          path: source
      
      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: Sync to Agent-Services
        run: |
          # Clone target repo
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/AGenNext/Agent-Services.git ../target
          
          cd source
          
          # Create/update AGENTS.md
          cat > ../target/AGENTS.md << 'AGENTS_EOF'
# Agent Registry

Central registry of all agents in the Agent-Services ecosystem.

